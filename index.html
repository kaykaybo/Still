document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ter; gap:0.7rem; padding:0.3rem 0.3rem; border-radius:14px; }\n  .channel[data-key=\"rain\"]{ --accent: var(--rain); }\n  .channel[data-key=\"waves\"]{ --accent: var(--waves); }\n  .channel[data-key=\"forest\"]{ --accent: var(--forest); }\n  .channel[data-key=\"hearth\"]{ --accent: var(--hearth); }\n  .channel[data-key=\"drift\"]{ --accent: var(--drift); }\n\n  .toggle{\n    flex:0 0 auto; display:flex; align-items:center; gap:0.65rem; cursor:pointer;\n    padding:0.6rem 1.05rem; min-height:46px; min-width:8.2em; border-radius:24px;\n    background: color-mix(in oklab,var(--ink) 5%,transparent);\n    border:1px solid color-mix(in oklab,var(--ink) 11%,transparent);\n    transition: background .5s ease, border-color .5s ease, transform .14s ease;\n  }\n  .toggle:hover{ background: color-mix(in oklab,var(--ink) 9%,transparent); }\n  .toggle:active{ transform: scale(0.97); }\n  .channel.on .toggle{ background: color-mix(in oklab,var(--accent) 16%,transparent); border-color: color-mix(in oklab,var(--accent) 44%,transparent); }\n  .toggle .dot{\n    width:9px; height:9px; border-radius:50%; flex:0 0 auto;\n    border:1.5px solid color-mix(in oklab,var(--ink) 32%,transparent); background:transparent;\n    transition: background .5s ease, border-color .5s ease;\n  }\n  .channel.on .toggle .dot{ background:var(--accent); border-color:var(--accent); animation: dotpulse 3.4s ease-in-out infinite; }\n  @keyframes dotpulse{ 0%,100%{ box-shadow:0 0 0 0 color-mix(in oklab,var(--accent) 60%,transparent);} 50%{ box-shadow:0 0 0 5px color-mix(in oklab,var(--accent) 0%,transparent);} }\n  .toggle .name{\n    font-family:'Cormorant Garamond',serif; font-weight:500; font-size:1.06rem; letter-spacing:0.06em;\n    color:var(--ink-soft); opacity:0.72; transition:color .5s ease, opacity .5s ease; white-space:nowrap;\n  }\n  .channel.on .toggle .name{ color:var(--ink); opacity:1; }\n\n  .slider{ position:relative; flex:1 1 auto; height:42px; cursor:pointer; display:flex; align-items:center; (--ink) 50%,transparent);\n  }\n  .timer-menu.open{ display:flex; }\n  .timer-menu button{\n    background:none; border:none; cursor:pointer; text-align:left;\n    font-family:'Jost',sans-serif; font-size:0.62rem; letter-spacing:0.16em; text-transform:uppercase;\n    color:var(--ink-soft); padding:0.55rem 0.7rem; border-radius:9px; transition:background .3s,color .3s;\n  }\n  .timer-menu button:hover{ background: color-mix(in oklab,var(--ink) 8%,transparent); color:var(--ink); }\n\n  /* presets */\n  .presets{ display:flex; flex-wrap:wrap; justify-content:center; gap:0.4rem; width:100%; margin-bottom:0.95rem; pointer-events:auto; }\n  .preset{\n    display:inline-flex; align-items:center; gap:0.4rem; cursor:pointer;\n    font-family:'Jost',sans-serif; font-size:0.56rem; letter-spacing:0.16em; text-transform:uppercase;\n    color:var(--ink-soft); background: color-mix(in oklab,var(--ink) 5%,transparent);\n    border:1px solid color-mix(in oklab,var(--ink) 11%,transparent); border-radius:20px;\n    padding:0.45rem 0.8rem; transition: background .4s, border-color .4s, color .4s; white-space:nowrap;\n  }\n  .preset:hover{ color:var(--ink); border-color: color-mix(in oklab,var(--ink) 26%,transparent); }\n  .preset.save{ border-style:dashed; }\n  .preset .x{ font-size:0.78rem; opacity:0.5; line-height:1; margin-left:0.1rem; }\n  .preset .x:hover{ opacity:1; }\n\n  /* breathing guide */\n  .breathe-guide{ position:fixed; left:50%; top:51%; transform:translate(-50%,-50%); pointer-events:none; display:none; flex-direction:column; align-items:center; gap:1.5rem; }\n  .breathe-guide.on{ display:flex; }\n  .breathe-guide .orb{\n    width: clamp(120px, 30vmin, 230px); aspect-ratio:1; border-radius:50%;\n    border:1px solid color-mix(in oklab, var(--ink) 28%, transparent);\n    background: radial-gradient(circle at 50% 50%, color-mix(in oklab, var(--ink) 10%, transparent), transparent 72%);\n    transform: scale(0.6);\n  }\n  .breathe-guide .phase{ font-family:'Cormorant Garamond',serif; font-style:italic; font-size: clamp(1.1rem,3vw,1.5rem); letter-spacing:0.04em; color:var(--ink-soft); }\n\n  /* toast */\n  .toast{ position:fixed; left:50%; top:18%; transform:translate(-50%,-8px); z-index:45; pointer-events:none; opacity:0; font-family:'Cormorant Garamond',serif; font-style:italic; font-size: clamp(1.1rem,3vw,1.5rem); color:var(--ink); transition: opacity .8s ease, transform .8s ease; }\n  .toast.show{ opacity:1; transform:translate(-50%,0); }\n\n  @media (max-height: 640px){ .console{ bottom:0.7rem; } .mixer{ gap:0.12rem; } .toggle{ min-height:42px; } }\n  @media (prefers-reduced-motion: reduce){ #veil .sub{ animation:none; opacity:.7 } }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <canvas id=\"scene\"><\u002Fcanvas>\n  <div id=\"grain\"><\u002Fdiv>\n\n  <div id=\"ui\">\n    <div class=\"breathe-guide\" id=\"breatheGuide\"><div class=\"orb\" id=\"breatheOrb\"><\u002Fdiv><div class=\"phase\" id=\"breathePhase\">Breathe in<\u002Fdiv><\u002Fdiv>\n\n    <header class=\"topbar dim-hide\">\n      <div class=\"wordmark\">\n        <span class=\"mono\"><svg viewBox=\"0 0 40 40\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\"><circle cx=\"20\" cy=\"20\" r=\"15\" stroke=\"currentColor\" stroke-width=\"1.1\"><\u002Fcircle><circle cx=\"20\" cy=\"17\" r=\"3.3\" fill=\"currentColor\"><\u002Fcircle><line x1=\"9\" y1=\"23.5\" x2=\"31\" y2=\"23.5\" stroke=\"currentColor\" stroke-width=\"1.1\" stroke-linecap=\"round\"><\u002Fline><line x1=\"12.5\" y1=\"27\" x2=\"27.5\" y2=\"27\" stroke=\"currentColor\" stroke-width=\"1.1\" stroke-linecap=\"round\" opacity=\"0.5\"><\u002Fline><\u002Fsvg><\u002Fspan>\n        <span class=\"name\">Still<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"controls\">\n        <button class=\"pill\" id=\"breatheToggle\" aria-label=\"Toggle breathing guide\"><span class=\"dot\"><\u002Fspan><span>Breathe<\u002Fspan><\u002Fbutton>\n        <div class=\"pill-wrap\">\n          <button class=\"pill\" id=\"timer lass=\"fill\"><\u002Fdiv><div class=\"thumb\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"channel\" data-key=\"waves\">\n            <button class=\"toggle\"><span class=\"dot\"><\u002Fspan><span class=\"name\">Tide<\u002Fspan><\u002Fbutton>\n            <div class=\"slider\"><div class=\"track\"><\u002Fdiv><div class=\"fill\"><\u002Fdiv><div class=\"thumb\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"channel\" data-key=\"forest\">\n            <button class=\"toggle\"><span class=\"dot\"><\u002Fspan><span class=\"name\">Grove<\u002Fspan><\u002Fbutton>\n            <div class=\"slider\"><div class=\"track\"><\u002Fdiv><div class=\"fill\"><\u002Fdiv><div class=\"thumb\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"channel\" data-key=\"hearth\">\n            <button class=\"toggle\"><span class=\"dot\"><\u002Fspan><span class=\"name\">Hearth<\u002Fspan><\u002Fbutton>\n            <div class=\"slider\"><div class=\"track\"><\u002Fdiv><div class=\"fill\"><\u002Fdiv><div class=\"thumb\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"channel\" data-key=\"drift\">\n            <button class=\"toggle\"><span class=\"dot\"><\u002Fspan><span class=\"name\">Drift<\u002Fspan><\u002Fbutton>\n            <div class=\"slider\"><div class=\"track\"><\u002Fdiv><div class=\"fill\"><\u002Fdiv><div class=\"thumb\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"toast\" id=\"toast\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"veil\">\n    <div class=\"mono-lg\"><svg viewBox=\"0 0 40 40\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\"><circle cx=\"20\" cy=\"20\" r=\"15\" stroke=\"currentColor\" stroke-width=\"1\"><\u002Fcircle><circle cx=\"20\" cy=\"17\" r=\"3.3\" fill=\"currentColor\"><\u002Fcircle><line x1=\"9\" y1=\"23.5\" x2=\"31\" y2=\"23.5\" stroke=\"currentColor\" stroke-width=\"1\" stroke-linecap=\"round\"><\u002Fline><line x1=\"12.5\" y1=\"27\" x2=\"27.5\" y2=\"27\" stroke=\"currentColor\" stroke-width=\"1\" stroke-linecap=\"round\" opacity=\"0.5\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n    <div class=\"veil-greeting\" id=\"veilGreeting\"><\u002Fdiv>\n    <div class=\"mark\">Still<\u002Fdiv>\n    <div class=\"veil-tag\" id=\"veilTag\">Ambient compositions for quiet hours<\u002Fdiv>\n    <div class=\"sub\">Enter<\u002Fdiv>\n  <\u002Fdiv>\n\n<script>\n/* ============================================================\n   STILLNESS — generative scene + synthesized soundscapes.\n   Everything is drawn; every sound is generated live.\n   ============================================================ */\n\nconst STORE_KEY = 'stillness.v1';\nconst defaults = {\n  theme: 'day', themeUserSet:false, auto: false, presets: [], collapsed: false, soundsCollapsed:false,\n  channels: {\n    rain:   { on:false, vol:0.45 },\n    waves:  { on:false, vol:0.5 },\n    forest: { on:false, vol:0.45 },\n    hearth: { on:false, vol:0.4 },\n    drift:  { on:false, vol:0.4 },\n  }\n};\nconst CHANNELS = ['rain','waves','forest','hearth','drift'];\n/* curated starting points */\nconst BUILTINS = [\n  { name:'Rainy Night',    theme:'night', set:{ rain:0.6, hearth:0.3 } },\n  { name:'Forest Morning', theme:'day',   set:{ forest:0.6, rain:0.2 } },\n  { name:'Open Sea',       theme:'day',   set:{ waves:0.72 } },\n  { name:'Hearthside',     theme:'night', set:{ hearth:0.6, drift:0.24 } },\n  { name:'Deep Calm',      theme:'day',   set:{ drift:0.5, waves:0.3 } },\n];\nlet state;\ntry { state = Object.assign({}, defaults, JSON.parse(localStorage.getItem(STORE_KEY)||'{}')); }\ncatch(e){ state = JSON.parse(JSON.stringify(defaults)); }\nstate.channels = Object.assign(JSON.parse(JSON.stringify(defaults.channels)), state.channels||{});\nif(!Array.isArray(state.presets)) state.presets = [];\nfunction save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){} }\n\n/* ---------- color palettes (canvas rgb) ---------- */\nconst THEMES = {\n  day: {\n    bg:    [247,240,246],\n    glowA: [250,223,234],\n    glowB: [219,230,249],\n    ink:   [88,72,94],\n    vignette: [122,98,128],\n    rest:  [206,186,208],\n    disc:  [255,238,245],\n    mist:  [243,237,249],\n    accents: { rain:[152,180,216], waves:[152,198,212], forest:[172,202,178], hearth:[232,168,182], drift:[190,176,218] },\n  },\n  night: {\n    bg:    [30,28,46],\n    glowA: [82,62,100],\n    glowB: [50,56,92],\n    ink:   [236,226,242],\n    vignette: [12,10,24],\n    rest:  [152,122,162],\n    disc:  [230,226,244],\n    mist:  [150,150,184],\n    accents: { rain:[158,178,216], waves:[158,198,212], forest:[178,204,184], hearth:[232,166,180], drift:[192,178,222] },\n  },\n};\nlet TH = THEMES.day;\n\n/* ============================================================\n   SCENE\n   ============================================================ */\nconst canvas = document.getElementById('scene');\nconst ctx = canvas.getContext('2d');\nlet W=0, H=0, DPR=1;\n\nconst sprite = document.createElement('canvas'); sprite.width=sprite.height=64;\nfunction buildSprite(){\n  const s=sprite.getContext('2d'); s.clearRect(0,0,64,64);\n  const g=s.createRadialGradient(32,32,0,32,32,32);\n  const [r,gn,b]=TH.ink;\n  g.addColorStop(0,`rgba(${r},${gn},${b},0.9)`); g.addColorStop(0.4,`rgba(${r},${gn},${b},0.4)`); g.addColorStop(1,`rgba(${r},${gn},${b},0)`);\n  s.fillStyle=g; s.beginPath(); s.arc(32,32,32,0,Math.PI*2); s.fill();\n}\n\nlet particles=[];\nlet pollen=[];\nfunction makePollen(){\n  const count=Math.round(Math.min(34,Math.max(14,(W*H)/70000)));\n  pollen=[];\n  for(let i=0;i<count;i++) pollen.push({\n    x:Math.random()*W, y:Math.random()*H,\n    r:1.0+Math.random()*1.8, drift:Math.random()*Math.PI*2,\n    spd:0.10+Math.random()*0.18, sway:0.3+Math.random()*0.6,\n    swayPh:Math.random()*Math.PI*2, glow:0.4+Math.random()*0.5,\n  });\n}\nlet shafts=[];\nfunction makeShafts(){\n  shafts=[];\n  const n=3;\n  for(let i=0;i<n;i++) shafts.push({\n    baseX:W*(0.18+i*0.3+Math.random()*0.1), w:W*(0.06+Math.random()*0.05),\n    ang:0.32+Math.random()*0.12, sway:0.4+Math.random()*0.5,\n    swayPh:Math.random()*Math.PI*2, str:0.6+Math.random()*0.4,\n  });\n}\nlet fireflies=[];\nfunction makeFireflies(){\n  const count=Math.round(Math.min(26,Math.max(10,(W*H)/95000)));\n  fireflies=[];\n  for(let i=0;i<count;i++) fireflies.push({\n    x:Math.random()*W, y:H*(0.4+Math.random()*0.55),\n    drift:Math.random()*Math.PI*2, dphase:Math.random()*Math.PI*2,\n    speed:0.18+Math.random()*0.3, blinkSpd:0.5+Math.random()*0.9,\n    blinkPh:Math.random()*Math.PI*2, r:1.1+Math.random()*1.1,\n  });\n}\nfunction makeParticles(){\n  const count=Math.round(Math.min(80,Math.max(34,(W*H)/26000)));\n  particles=[];\n  for(let i=0;i<count;i++) particles.push({\n    x:Math.random()*W, y:Math.random()*H, r:0.7+Math.random()*2.4,\n    a:0.05+Math.random()*0.14, vx:(Math.random()-0.5)*0.1, vy:-0.04-Math.random()*0.12,\n    phase:Math.random()*Math.PI*2, sway:0.15+Math.random()*0.4,\n  });\n}\n\n/* soft drifting orbs (minimalist colored shapes) */\nlet orbs=[];\nfunction makeOrbs(){\n  orbs=[];\n  const n=6;\n  for(let i=0;i<n;i++) orbs.push({\n    x:Math.random()*W, y:Math.random()*H,\n    r:Math.min(W,H)*(0.14+Math.random()*0.18),\n    vx:(Math.random()-0.5)*0.08, vy:(Math.random()-0.5)*0.06,\n    a:0.05+Math.random()*0.06, tint:i%3,\n  });\n}\n\n/* soft drifting mist bands */\nlet mist=[];\nfunction makeMist(){\n  mist=[];\n  const n=4;\n  for(let i=0;i<n;i++) mist.push({\n    x:Math.random()*W, baseY:H*(0.48+Math.random()*0.42),\n    r:Math.min(W,H)*(0.42+Math.random()*0.34),\n    vx:(0.05+Math.random()*0.07)*(Math.random()<0.5?-1:1),\n    phase:Math.random()*Math.PI*2, a:0.05+Math.random()*0.045,\n  });\n}\n\n/* aurora ribbons — slow pastel bands drifting across the sky */\nlet ribbons=[]; let horizonY=0;\nfunction makeRibbons(){\n  const defs=[\n    { tint:'pink', yf:0.30, amp:0.055, wl:1.4, sp: 0.013, th:0.11 },\n    { tint:'blue', yf:0.40, amp:0.075, wl:1.1, sp:-0.009, th:0.14 },\n    { tint:'pink', yf:0.50, amp:0.060, wl:1.8, sp: 0.007, th:0.12 },\n    { tint:'blue', yf:0.24, amp:0.045, wl:0.9, sp:-0.005, th:0.09 },\n  ];\n  ribbons = defs.map(d=>({ ...d, phase:Math.random()*Math.PI*2 }));\n}\n\nlet ripples=[];\nfunction addRipple(x,y,strength=1){\n  ripples.push({ x,y, r:2, max:(70+Math.random()*90)*strength, life:0, dur:2600+Math.random()*2200, rings:Math.random()<0.4?2:1, tint:0.45+Math.random()*0.45 });\n  if(ripples.length>70) ripples.shift();\n}\n\nfunction resize(){\n  DPR=Math.min(window.devicePixelRatio||1,2);\n  W=window.innerWidth; H=window.innerHeight;\n  canvas.width=Math.floor(W*DPR); canvas.height=Math.floor(H*DPR);\n  canvas.style.width=W+'px'; canvas.style.height=H+'px';\n  ctx.setTransform(DPR,0,0,DPR,0,0);\n  makeParticles(); makeOrbs(); makeMist(); makeRibbons(); makeFireflies(); makePollen(); makeShafts();\n}\n\n/* eased scene colors */\nlet glowA=[252,247,237], glowB=[229,218,201], accentCur=[154,168,182];\nfunction lerp(a,b,t){ return a+(b-a)*t; }\nfunction lerpRGB(c,t,k){ for(let i=0;i<3;i++) c[i]=lerp(c[i],t[i],k); }\n\nlet begun=false, rainTarget=0, rainIntensity=0, lastDrop=0, autoDrop=0, nightMix=0, forestMix=0;\nlet pointer={x:-999,y:-999,a:0};\nlet last=performance.now();\n\nfunction frame(now){\n  const dt=Math.min(64,now-last); last=now;\n  const t=now/1000;\n\n  /* ----- compute target scene colors ----- */\n  const tA=TH.glowA.slice(), tB=TH.glowB.slice();\n  let acc=TH.ink.slice(); let accW=0;\n  for(const k of CHANNELS){\n    const ch=state.channels[k];\n    if(ch.on && ch.vol>0.01){\n      const ac=TH.accents[k]; const f=ch.vol;\n      lerpRGB(tA, ac, 0.42*f); lerpRGB(tB, ac, 0.30*f);\n      acc=acc.map((v,i)=>v+ac[i]*f); accW+=f;\n    }\n  }\n  if(accW>0) acc=acc.map(v=>v/(accW+0.0001)); else acc=THEMES===null?acc:blendNeutral();\n  /* auto mode: slowly drift a soft colour over everything */\n  if(state.auto){\n    const ph=t*0.045;\n    const auto=[ 150+58*Math.sin(ph), 150+58*Math.sin(ph+2.1), 150+58*Math.sin(ph+4.2) ];\n    if(TH===THEMES.night) for(let i=0;i<3;i++) auto[i]*=0.62;\n    lerpRGB(tA, auto, 0.5); lerpRGB(tB, auto, 0.4); lerpRGB(acc, auto, 0.55);\n  }\n  lerpRGB(glowA,tA,0.025); lerpRGB(glowB,tB,0.025); lerpRGB(accentCur,acc,0.02);\n\n  /* ----- background ----- */\n  const [br,bg,bb]=TH.bg;\n  ctx.fillStyle=`rgb(${br|0},${bg|0},${bb|0})`; ctx.fillRect(0,0,W,H);\n  drawGlow(W*(0.32+0.12*Math.sin(t*0.05)), H*(0.36+0.10*Math.cos(t*0.043)), Math.max(W,H)*0.64, glowA, 0.6);\n  drawGlow(W*(0.70+0.10*Math.cos(t*0.037+1.7)), H*(0.66+0.09*Math.sin(t*0.031)), Math.max(W,H)*0.56, glowB, 0.5);\n\n  /* ----- aurora ribbons + horizon (sky behind the disc) ----- */\n  horizonY = H*0.6;\n  drawRibbons(t);\n  drawHorizon(t);\n\n\n  /* ----- celestial disc (sun by day / moon by night) + reflection ----- */\n  const cx=W/2, cy=H*0.32, discR=Math.min(W,H)*0.108;\n  drawCelestial(t, cx, cy, discR);\n\n  /* ----- drifting mist (organic atmosphere) ----- */\n  drawMist(t);\n\n  /* ----- drifting orbs ----- */\n  for(const o of orbs){\n    o.x+=o.vx*(state.auto?1.7:1); o.y+=o.vy*(state.auto?1.7:1);\n    if(o.x<-o.r) o.x=W+o.r; if(o.x>W+o.r) o.x=-o.r;\n    if(o.y<-o.r) o.y=H+o.r; if(o.y>H+o.r) o.y=-o.r;\n    drawGlow(o.x,o.y,o.r,accentCur,o.a);\n  }\n\n  /* ----- breathing halo ring around the disc ----- */\n  const breath=0.5+0.5*Math.sin(t*0.32);\n  const ringR=discR*(1.7+0.14*breath);\n  ctx.strokeStyle=`rgba(${accentCur.map(v=>v|0).join(',')},${0.05+0.05*breath})`;\n  ctx.lineWidth=1.1; ctx.beginPath(); ctx.arc(cx,cy,ringR,0,Math.PI*2); ctx.stroke();\n\n  /* ----- ripples ----- */\n  rainIntensity+=(rainTarget-rainIntensity)*0.02;\n  const baseInterval=2600-rainIntensity*1900;\n  if(begun && now-lastDrop>baseInterval*(0.6+Math.random()*0.9)){ lastDrop=now; addRipple(Math.random()*W,Math.random()*H,0.7+rainIntensity*0.7); }\n  if(begun && state.auto && now-autoDrop>2600+Math.random()*1800){ autoDrop=now; addRipple(Math.random()*W,Math.random()*H,1.1); }\n  ctx.lineWidth=1.4;\n  const LB=[150,200,245]; /* light blue */\n  for(let i=ripples.length-1;i>=0;i--){\n    const rp=ripples[i]; rp.life+=dt; const p=rp.life/rp.dur;\n    if(p>=1){ ripples.splice(i,1); continue; }\n    const ease=1-Math.pow(1-p,2); const rad=rp.r+ease*rp.max; const fade=(1-p)*(1-p)*0.95;\n    const tn=rp.tint||0.5;\n    const [pr,pg,pb]=TH.ink;\n    const cr=pr+(LB[0]-pr)*tn, cg=pg+(LB[1]-pg)*tn, cb=pb+(LB[2]-pb)*tn;\n    for(let k=0;k<rp.rings;k++){ const rr=rad-k*9; if(rr<=0) continue;\n      ctx.strokeStyle=`rgba(${cr|0},${cg|0},${cb|0},${fade*(1-k*0.4)})`;\n      ctx.beginPath(); ctx.arc(rp.x,rp.y,rr,0,Math.PI*2); ctx.stroke(); }\n  }\n\n  /* ----- pointer glow (interactive) ----- */\n  pointer.a+=((pointer.idle?0:1)-pointer.a)*0.05;\n  if(pointer.a>0.01) drawGlow(pointer.x,pointer.y,Math.min(W,H)*0.18,accentCur,0.10*pointer.a);\n\n  /* ----- motes ----- */\n  for(const pt of particles){\n    pt.x+=pt.vx+Math.sin(t*0.3+pt.phase)*pt.sway*0.06; pt.y+=pt.vy;\n    if(pt.y<-10){ pt.y=H+10; pt.x=Math.random()*W; }\n    if(pt.x<-10) pt.x=W+10; if(pt.x>W+10) pt.x=-10;\n    const s=pt.r*7; ctx.globalAlpha=pt.a; ctx.drawImage(sprite,pt.x-s/2,pt.y-s/2,s,s);\n  }\n  ctx.globalAlpha=1;\n\n  /* ----- forest morning: light shafts + rising pollen, scaled by Forest volume ----- */\n  const fch=state.channels.forest;\n  const fTarget=(fch&&fch.on)?fch.vol:0;\n  forestMix += (fTarget-forestMix)*0.03;\n  if(forestMix>0.01){\n    const day=(TH!==THEMES.night);\n    // soft diagonal light shafts from upper-left, like sun through canopy\n    ctx.save();\n    ctx.globalCompositeOperation = day?'soft-light':'lighter';\n    for(const s of shafts){\n      const sx=s.baseX + Math.sin(t*0.06+s.swayPh)*W*0.02*s.sway;\n      const dx=Math.tan(s.ang)*H;\n      const a=forestMix*s.str*(day?0.22:0.10);\n      const grad=ctx.createLinearGradient(sx,0,sx+dx,H);\n      grad.addColorStop(0,`rgba(255,246,210,${a})`);\n      grad.addColorStop(0.6,`rgba(220,236,196,${a*0.4})`);\n      grad.addColorStop(1,'rgba(220,236,196,0)');\n      ctx.fillStyle=grad;\n      ctx.beginPath();\n      ctx.moveTo(sx,0); ctx.lineTo(sx+s.w,0);\n      ctx.lineTo(sx+dx+s.w*1.8,H); ctx.lineTo(sx+dx,H);\n      ctx.closePath(); ctx.fill();\n    }\n    ctx.restore();\n    // rising golden-green pollen\n    for(const p of pollen){\n      p.y-=p.spd*(0.6+forestMix); p.drift+=0.01;\n      p.x+=Math.sin(t*0.3+p.swayPh)*p.sway*0.3;\n      if(p.y<-6){ p.y=H+6; p.x=Math.random()*W; }\n      if(p.x<-6) p.x=W+6; if(p.x>W+6) p.x=-6;\n      const a=forestMix*p.glow*(day?0.5:0.32);\n      if(a<0.01) continue;\n      drawGlow(p.x,p.y,p.r*7,[224,232,150],a*0.5);\n      ctx.globalAlpha=a; ctx.fillStyle='rgb(238,240,196)';\n      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();\n    }\n    ctx.globalAlpha=1;\n  }\n\n  /* ----- fireflies (night only) ----- */\n  nightMix += ((TH===THEMES.night?1:0)-nightMix)*0.03;\n  if(nightMix>0.01){\n    for(const f of fireflies){\n      f.drift+=0.005*f.speed;\n      f.x+=Math.cos(f.drift)*f.speed + Math.sin(t*0.2+f.dphase)*0.12;\n      f.y+=Math.sin(f.drift*0.7)*f.speed*0.6 - 0.04;\n      if(f.x<-12) f.x=W+12; if(f.x>W+12) f.x=-12;\n      if(f.y<H*0.32){ f.y=H+8; f.x=Math.random()*W; }\n      if(f.y>H+12) f.y=H*0.4;\n      const blink=Math.max(0,Math.sin(t*f.blinkSpd+f.blinkPh));\n      const a=blink*blink*0.85*nightMix;\n      if(a<0.01) continue;\n      drawGlow(f.x,f.y,f.r*9,[255,224,138],a*0.5);\n      ctx.globalAlpha=a; ctx.fillStyle='rgb(255,238,178)';\n      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.fill();\n    }\n    ctx.globalAlpha=1;\n  }\n\n  /* ----- vignette ----- */\n  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35,W/2,H/2,Math.max(W,H)*0.75);\n  const [vr,vgn,vb]=TH.vignette;\n  vg.addColorStop(0,`rgba(${vr},${vgn},${vb},0)`); vg.addColorStop(1,`rgba(${vr},${vgn},${vb},0.16)`);\n  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);\n\n  if(breatheOn) updateBreathe();\n\n  requestAnimationFrame(frame);\n}\nfunction blendNeutral(){ return (TH.rest||TH.ink).slice(); }\nfunction drawGlow(x,y,r,rgb,alpha){\n  const g=ctx.createRadialGradient(x,y,0,x,y,r); const [cr,cg,cb]=rgb;\n  g.addColorStop(0,`rgba(${cr|0},${cg|0},${cb|0},${alpha})`); g.addColorStop(1,`rgba(${cr|0},${cg|0},${cb|0},0)`);\n  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);\n}\n\n/* soft elliptical blob (used for mist) */\nfunction drawSoftBlob(x,y,rx,ry,rgb,alpha){\n  ctx.save(); ctx.translate(x,y); ctx.scale(rx,ry);\n  const g=ctx.createRadialGradient(0,0,0,0,0,1); const [r,gn,b]=rgb;\n  g.addColorStop(0,`rgba(${r|0},${gn|0},${b|0},${alpha})`); g.addColorStop(1,`rgba(${r|0},${gn|0},${b|0},0)`);\n  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,1,0,Math.PI*2); ctx.fill(); ctx.restore();\n}\n\n/* sun / moon focal disc with halo + water reflection */\nfunction drawCelestial(t, cx, cy, r){\n  const night = (TH===THEMES.night);\n  const col = TH.disc; const [cr,cg,cb] = col;\n  const breath = 0.5+0.5*Math.sin(t*0.22);\n  const y = cy + Math.sin(t*0.08)*r*0.05;\n  /* halo */\n  drawGlow(cx, y, r*3.6, col, (night?0.22:0.15)*(0.85+0.15*breath));\n  /* disc body */\n  const g=ctx.createRadialGradient(cx,y,0,cx,y,r);\n  g.addColorStop(0,`rgba(${cr},${cg},${cb},${night?0.9:0.72})`);\n  g.addColorStop(0.68,`rgba(${cr},${cg},${cb},${night?0.55:0.4})`);\n  g.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);\n  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,y,r,0,Math.PI*2); ctx.fill();\n  /* reflection shimmering down onto the water (starts at the waterline) */\n  const top=Math.max(y+r*0.7, (horizonY||H*0.6)), bot=H*0.97;\n  if(bot>top){\n    const rg=ctx.createLinearGradient(0,top,0,bot);\n    rg.addColorStop(0,`rgba(${cr},${cg},${cb},${night?0.16:0.11})`);\n    rg.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);\n    const hw=r*(0.55+0.06*Math.sin(t*0.5));\n    ctx.fillStyle=rg; ctx.fillRect(cx-hw, top, hw*2, bot-top);\n    /* cut the reflection into gentle ripple bands */\n    const [bgr,bgg,bgb]=TH.bg;\n    for(let i=0;i<8;i++){\n      const yy=top+(bot-top)*(i/8)+Math.sin(t*0.6+i*1.3)*2.2;\n      ctx.fillStyle=`rgba(${bgr},${bgg},${bgb},0.28)`;\n      ctx.fillRect(cx-hw, yy, hw*2, 1.4+i*0.35);\n    }\n  }\n}\n\n/* slow drifting mist layers */\nfunction drawMist(t){\n  for(const m of mist){\n    m.x += m.vx;\n    if(m.x < -m.r) m.x = W+m.r; if(m.x > W+m.r) m.x = -m.r;\n    const y = m.baseY + Math.sin(t*0.05+m.phase)*H*0.02;\n    const a = m.a*(0.75+0.25*Math.sin(t*0.07+m.phase));\n    drawSoftBlob(m.x, y, m.r, m.r*0.3, TH.mist, a);\n  }\n}\n\n/* aurora ribbons — soft pink & blue bands that undulate across the sky */\nfunction drawRibbons(t){\n  const night = (TH===THEMES.night);\n  const pink = night ? [206,150,214] : [250,206,224];\n  const blue = night ? [150,172,222] : [199,216,249];\n  ctx.save();\n  ctx.globalCompositeOperation = night ? 'lighter' : 'source-over';\n  const steps = 26;\n  for(const rb of ribbons){\n    const col = rb.tint==='pink' ? pink : blue;\n    const yc  = H*rb.yf;\n    const amp = H*rb.amp;\n    const th  = H*rb.th;\n    const ph  = rb.phase + t*rb.sp;\n    ctx.beginPath();\n    for(let s=0;s<=steps;s++){\n      const x=(s/steps)*W;\n      const y=yc + Math.sin((x/W)*Math.PI*2*rb.wl + ph)*amp;\n      s===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);\n    }\n    for(let s=steps;s>=0;s--){\n      const x=(s/steps)*W;\n      const y=yc + th + Math.sin((x/W)*Math.PI*2*rb.wl + ph + 0.9)*amp;\n      ctx.lineTo(x,y);\n    }\n    ctx.closePath();\n    const peak = night ? 0.15 : 0.11;\n    const g=ctx.createLinearGradient(0, yc-amp, 0, yc+th+amp);\n    g.addColorStop(0,   `rgba(${col[0]},${col[1]},${col[2]},0)`);\n    g.addColorStop(0.5, `rgba(${col[0]},${col[1]},${col[2]},${peak})`);\n    g.addColorStop(1,   `rgba(${col[0]},${col[1]},${col[2]},0)`);\n    ctx.fillStyle=g; ctx.fill();\n  }\n  ctx.restore();\n}\n\n/* a barely-there horizon where sky meets water */\nfunction drawHorizon(t){\n  const hy = horizonY;\n  const hz = TH.mist;\n  const night = (TH===THEMES.night);\n  const g=ctx.createLinearGradient(0, hy-H*0.11, 0, hy+H*0.06);\n  g.addColorStop(0,   `rgba(${hz[0]},${hz[1]},${hz[2]},0)`);\n  g.addColorStop(0.62,`rgba(${hz[0]},${hz[1]},${hz[2]},${night?0.10:0.16})`);\n  g.addColorStop(1,   `rgba(${hz[0]},${hz[1]},${hz[2]},0)`);\n  ctx.fillStyle=g; ctx.fillRect(0, hy-H*0.11, W, H*0.17);\n  const [ir,ig,ib]=TH.ink;\n  ctx.strokeStyle=`rgba(${ir},${ig},${ib},${night?0.07:0.055})`;\n  ctx.lineWidth=1;\n  ctx.beginPath(); ctx.moveTo(0,hy+0.5); ctx.lineTo(W,hy+0.5); ctx.stroke();\n\n  /* ----- wave crest lines below the horizon, scaled by Tide volume ----- */\n  const wch = state.channels.waves;\n  const wv = (wch && wch.on) ? wch.vol : 0;\n  if(wv>0.01){\n    const lines = 5;\n    for(let i=0;i<lines;i++){\n      const yBase = hy + H*0.018 + i*H*0.026;\n      const depth = i/(lines-1);                 // 0 near horizon → 1 toward bottom\n      const amp = H*(0.004 + 0.010*wv)*(0.5+depth);\n      const wl = W/(2.2 - depth*0.8);\n      const sp = 0.12 + depth*0.10;\n      const a = (night?0.10:0.085) * wv * (1-depth*0.45);\n      ctx.strokeStyle=`rgba(${ir},${ig},${ib},${a})`;\n      ctx.lineWidth = 1 + depth*0.6;\n      ctx.beginPath();\n      for(let x=0;x<=W;x+=8){\n        const y = yBase + Math.sin(x/wl + t*sp + i*1.3)*amp\n                        + Math.sin(x/(wl*0.5) - t*sp*1.4)*amp*0.35;\n        x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);\n      }\n      ctx.stroke();\n    }\n  }\n}\n\n/* ============================================================\n   SOUND\n   ============================================================ */\nlet actx=null, master=null; const nodes={}; let birdTimer=null;\n\nfunction makeNoise(seconds,type){\n  const len=Math.floor(actx.sampleRate*seconds);\n  const buf=actx.createBuffer(1,len,actx.sampleRate); const d=buf.getChannelData(0);\n  if(type==='brown'){ let last=0; for(let i=0;i<len;i++){ const w=Math.random()*2-1; last=(last+0.02*w)/1.02; d[i]=last*3.2; } }\n  else if(type==='pink'){ let b0=0,b1=0,b2=0; for(let i=0;i<len;i++){ const w=Math.random()*2-1;\n    b0=0.99765*b0+w*0.0990460; b1=0.96300*b1+w*0.2965164; b2=0.57000*b2+w*1.0526913; d[i]=(b0+b1+b2+w*0.1848)*0.12; } }\n  else { for(let i=0;i<len;i++) d[i]=Math.random()*2-1; }\n  return buf;\n}\nfunction loopSource(buffer){ const s=actx.createBufferSource(); s.buffer=buffer; s.loop=true; s.start(); return s; }\nfunction makeVolGain(){ const g=actx.createGain(); g.gain.value=0; g.connect(master); return g; }\n\nfunction initAudio(){\n  if(actx) return;\n  actx=new (window.AudioContext||window.webkitAudioContext)();\n  master=actx.createGain(); master.gain.value=0; master.connect(actx.destination);\n  master.gain.setTargetAtTime(0.82,actx.currentTime,1.2);\n  buildRain(); buildWaves(); buildForest(); buildHearth(); buildDrift();\n}\n\n/* light, soothing rainfall — a soft muffled bed + gentle droplet patter\n   (no bright broadband sheet, no low rumble = no \"torrential\" feel) */\nlet dropTimer=null, dropBuf=null;\nfunction buildRain(){\n  const vol=makeVolGain();\n  /* distant soft bed: dark, low-level pink noise */\n  const bed=loopSource(makeNoise(4,'pink'));\n  const hp=actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=300; hp.Q.value=0.3;\n  const lp=actx.createBiquadFilter(); lp.type='lowpass';  lp.frequency.value=1050; lp.Q.value=0.3;\n  const bedG=actx.createGain(); bedG.gain.value=0.15;\n  bed.connect(hp); hp.connect(lp); lp.connect(bedG); bedG.connect(vol);\n  /* very gentle drift so the bed breathes */\n  const lfo=actx.createOscillator(); lfo.frequency.value=0.07;\n  const lfoG=actx.createGain(); lfoG.gain.value=160;\n  lfo.connect(lfoG); lfoG.connect(lp.frequency); lfo.start();\n  /* small noise buffer reused for individual droplets */\n  dropBuf=makeNoise(0.25,'white');\n  nodes.rain={vol};\n  scheduleDrop();\n}\n/* sparse, soft, randomly-pitched droplets = light rain character */\nfunction scheduleDrop(){\n  clearTimeout(dropTimer);\n  const next=170+Math.random()*260;            // sparser, calmer patter\n  dropTimer=setTimeout(()=>{\n    if(actx && nodes.rain && state.channels.rain.on) droplet();\n    scheduleDrop();\n  }, next);\n}\nfunction droplet(){\n  const t0=actx.currentTime;\n  const src=actx.createBufferSource(); src.buffer=dropBuf;\n  const bp=actx.createBiquadFilter(); bp.type='bandpass';\n  bp.frequency.value=520+Math.random()*1100; bp.Q.value=1.0+Math.random()*1.0;\n  const g=actx.createGain();\n  const peak=0.008+Math.random()*0.02;\n  g.gain.setValueAtTime(0,t0);\n  g.gain.linearRampToValueAtTime(peak,t0+0.004);\n  g.gain.exponentialRampToValueAtTime(0.0004,t0+0.045+Math.random()*0.07);\n  src.connect(bp); bp.connect(g); g.connect(nodes.rain.vol);\n  src.start(t0); src.stop(t0+0.22);\n}\n\nfunction buildWaves(){\n  const vol=makeVolGain();\n  const swell=actx.createGain(); swell.gain.value=0.45; swell.connect(vol);\n  const src=loopSource(makeNoise(4,'brown'));\n  const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=520; lp.Q.value=0.4;\n  src.connect(lp); lp.connect(swell);\n  const lfo=actx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.09;\n  const lfoG=actx.createGain(); lfoG.gain.value=0.34;\n  lfo.connect(lfoG); lfoG.connect(swell.gain); lfo.start();\n  /* faint crest hiss riding the swell */\n  const hiss=loopSource(makeNoise(4,'pink'));\n  const hp=actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=1400;\n  const hg=actx.createGain(); hg.gain.value=0.03;\n  hiss.connect(hp); hp.connect(hg); hg.connect(vol);\n  const l2=actx.createGain(); l2.gain.value=0.025; lfo.connect(l2); l2.connect(hg.gain);\n  nodes.waves={vol};\n}\n\nfunction buildForest(){\n  const vol=makeVolGain();\n  /* airy leaf-rustle bed: mid/high band, NOT a deep lowpass (deep + slow sweep = ocean) */\n  const wind=loopSource(makeNoise(4,'pink'));\n  const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2200; bp.Q.value=0.5;\n  const hp=actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=850;\n  /* gust envelope: gentle swelling whoosh of light wind */\n  const gust=actx.createGain(); gust.gain.value=0.17;\n  wind.connect(bp); bp.connect(hp); hp.connect(gust); gust.connect(vol);\n  /* two detuned slow LFOs = irregular, natural gusts (not a metronomic swell) */\n  const g1=actx.createOscillator(); g1.type='sine'; g1.frequency.value=0.085;\n  const g1g=actx.createGain(); g1g.gain.value=0.12; g1.connect(g1g); g1g.connect(gust.gain); g1.start();\n  const g2=actx.createOscillator(); g2.type='sine'; g2.frequency.value=0.19;\n  const g2g=actx.createGain(); g2g.gain.value=0.06; g2.connect(g2g); g2g.connect(gust.gain); g2.start();\n  /* leaves shimmer brighter as a gust rises */\n  const bL=actx.createOscillator(); bL.type='sine'; bL.frequency.value=0.085;\n  const bLg=actx.createGain(); bLg.gain.value=750; bL.connect(bLg); bLg.connect(bp.frequency); bL.start();\n  /* soft high leaf shimmer */\n  const leaf=loopSource(makeNoise(4,'pink'));\n  const lhp=actx.createBiquadFilter(); lhp.type='bandpass'; lhp.frequency.value=3600; lhp.Q.value=0.5;\n  const lg=actx.createGain(); lg.gain.value=0.04;\n  leaf.connect(lhp); lhp.connect(lg); lg.connect(vol);\n  nodes.forest={vol};\n  scheduleBird();\n}\nfunction scheduleBird(){\n  clearTimeout(birdTimer);\n  const next=3800+Math.random()*9000;\n  birdTimer=setTimeout(()=>{\n    if(actx && nodes.forest && state.channels.forest.on){\n      const trills=Math.random()<0.4?(2+Math.floor(Math.random()*2)):1;\n      for(let i=0;i<trills;i++) chirp(i*0.16+Math.random()*0.05);\n    }\n    scheduleBird();\n  }, next);\n}\nfunction chirp(delay){\n  const t0=actx.currentTime+delay;\n  const o=actx.createOscillator(); o.type='sine';\n  const base=1800+Math.random()*1500;\n  o.frequency.setValueAtTime(base,t0);\n  o.frequency.exponentialRampToValueAtTime(base*1.5,t0+0.06);\n  o.frequency.exponentialRampToValueAtTime(base*1.1,t0+0.13);\n  const g=actx.createGain();\n  g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(0.11,t0+0.012); g.gain.exponentialRampToValueAtTime(0.0005,t0+0.18);\n  o.connect(g); g.connect(nodes.forest.vol); o.start(t0); o.stop(t0+0.22);\n}\n\n/* hearth — a warm low roar + random crackling pops */\nlet crackleTimer=null, crackleBuf=null;\nfunction buildHearth(){\n  const vol=makeVolGain();\n  const bed=loopSource(makeNoise(4,'brown'));\n  const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=420; lp.Q.value=0.4;\n  const bg=actx.createGain(); bg.gain.value=0.5;\n  bed.connect(lp); lp.connect(bg); bg.connect(vol);\n  /* slow flicker of the flame */\n  const lfo=actx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.3;\n  const lfoG=actx.createGain(); lfoG.gain.value=120; lfo.connect(lfoG); lfoG.connect(lp.frequency); lfo.start();\n  crackleBuf=makeNoise(0.2,'white');\n  nodes.hearth={vol};\n  scheduleCrackle();\n}\nfunction scheduleCrackle(){\n  clearTimeout(crackleTimer);\n  const next=40+Math.random()*230;\n  crackleTimer=setTimeout(()=>{\n    if(actx && nodes.hearth && state.channels.hearth.on){\n      const pops=Math.random()<0.3?(2+Math.floor(Math.random()*3)):1;\n      for(let i=0;i<pops;i++) crackle(i*0.045+Math.random()*0.03);\n    }\n    scheduleCrackle();\n  }, next);\n}\nfunction crackle(delay){\n  const t0=actx.currentTime+delay;\n  const src=actx.createBufferSource(); src.buffer=crackleBuf;\n  const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=700+Math.random()*2400; bp.Q.value=1.6+Math.random()*1.6;\n  const g=actx.createGain();\n  const peak=0.015+Math.random()*0.055;\n  g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(peak,t0+0.003);\n  g.gain.exponentialRampToValueAtTime(0.0004,t0+0.03+Math.random()*0.07);\n  src.connect(bp); bp.connect(g); g.connect(nodes.hearth.vol); src.start(t0); src.stop(t0+0.18);\n}\n\n/* drift — a soft meditative tone pad (gentle open chord) */\nfunction buildDrift(){\n  const vol=makeVolGain();\n  const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=720; lp.Q.value=0.3;\n  lp.connect(vol);\n  const freqs=[110, 164.81, 220, 246.94];   // A2, E3, A3, B3 — open, calm\n  freqs.forEach((f,i)=>{\n    const o=actx.createOscillator(); o.type=(i===0?'sine':'triangle'); o.frequency.value=f;\n    o.detune.value=(Math.random()-0.5)*7;\n    const og=actx.createGain(); og.gain.value=0.06;\n    o.connect(og); og.connect(lp);\n    /* slow independent swell on each voice */\n    const l=actx.createOscillator(); l.type='sine'; l.frequency.value=0.04+i*0.025;\n    const lg=actx.createGain(); lg.gain.value=0.04;\n    l.connect(lg); lg.connect(og.gain); l.start(); o.start();\n  });\n  nodes.drift={vol};\n}\n\nfunction applyChannel(key,ramp=0.9){\n  if(!actx||!nodes[key]) return;\n  const ch=state.channels[key]; const target=ch.on?ch.vol:0;\n  /* rainfall eases in extra-gently on start-up so it never \"arrives\" abruptly */\n  if(key==='rain' && ch.on) ramp=3.2;\n  nodes[key].vol.gain.cancelScheduledValues(actx.currentTime);\n  nodes[key].vol.gain.setTargetAtTime(target,actx.currentTime,ramp/3);\n  if(key==='rain') rainTarget=ch.on?ch.vol:0;\n}\n\n/* ============================================================\n   UI\n   ============================================================ */\nconst ui=document.getElementById('ui'); const veil=document.getElementById('veil');\n\nfunction syncChannelUI(){\n  document.querySelectorAll('.channel').forEach(el=>{\n    const ch=state.channels[el.dataset.key];\n    el.classList.toggle('on',ch.on);\n    const pct=Math.round(ch.vol*100);\n    el.querySelector('.fill').style.width=pct+'%';\n    el.querySelector('.thumb').style.left=pct+'%';\n  });\n}\n\ndocument.querySelectorAll('.channel').forEach(el=>{\n  const key=el.dataset.key;\n  const slider=el.querySelector('.slider');\n  el.querySelector('.toggle').addEventListener('click',()=>{\n    if(actx && actx.state==='suspended') actx.resume();\n    const ch=state.channels[key]; ch.on=!ch.on;\n    if(ch.on && ch.vol<0.05) ch.vol=0.5;\n    applyChannel(key,0.6); syncChannelUI(); save();\n  });\n  let dragging=false;\n  function setFromEvent(e){\n    const rect=slider.getBoundingClientRect();\n    const cx=(e.touches?e.touches[0].clientX:e.clientX);\n    let v=Math.max(0,Math.min(1,(cx-rect.left)/rect.width));\n    const ch=state.channels[key]; ch.vol=v; if(!ch.on) ch.on=true;\n    applyChannel(key,0.15); syncChannelUI();\n  }\n  slider.addEventListener('pointerdown',e=>{ dragging=true; slider.setPointerCapture(e.pointerId); setFromEvent(e); });\n  slider.addEventListener('pointermove',e=>{ if(dragging) setFromEvent(e); });\n  slider.addEventListener('pointerup',()=>{ dragging=false; save(); });\n  slider.addEventListener('pointercancel',()=>{ dragging=false; save(); });\n});\n\n/* theme */\nconst themeToggle=document.getElementById('themeToggle'); const themeLabel=document.getElementById('themeLabel');\nfunction applyTheme(){\n  const night=state.theme==='night';\n  document.documentElement.setAttribute('data-theme',night?'night':'day');\n  themeLabel.textContent=night?'Day':'Night';\n  TH=night?THEMES.night:THEMES.day;\n  glowA=TH.glowA.slice(); glowB=TH.glowB.slice();\n  buildSprite();\n}\nthemeToggle.addEventListener('click',()=>{ state.theme=state.theme==='night'?'day':'night'; state.themeUserSet=true; applyTheme(); save(); });\n\n/* auto */\nconst autoToggle=document.getElementById('autoToggle');\nfunction applyAuto(){ autoToggle.classList.toggle('active',state.auto); }\nautoToggle.addEventListener('click',()=>{ state.auto=!state.auto; applyAuto(); save(); });\n\n/* pointer interaction */\nfunction moveTo(e){ const x=e.touches?e.touches[0].clientX:e.clientX; const y=e.touches?e.touches[0].clientY:e.clientY; pointer.x=x; pointer.y=y; pointer.idle=false; }\ncanvas.addEventListener('pointerdown',e=>{ if(!begun) return; moveTo(e); addRipple(pointer.x,pointer.y,1.4); });\nlet lastDrag=0;\ncanvas.addEventListener('pointermove',e=>{ if(!begun) return; moveTo(e); const n=performance.now(); if(e.buttons && n-lastDrag>140){ lastDrag=n; addRipple(pointer.x,pointer.y,0.9); } });\ncanvas.addEventListener('pointerleave',()=>{ pointer.idle=true; });\n\n/* idle */\nlet idleTimer=null;\nfunction wake(){ document.body.classList.remove('idle'); pointer.idle=false; clearTimeout(idleTimer); idleTimer=setTimeout(()=>{ document.body.classList.add('idle'); pointer.idle=true; },4000); }\n['pointermove','pointerdown','keydown','touchstart'].forEach(ev=>window.addEventListener(ev,wake,{passive:true}));\n\n/* begin */\nfunction begin(){\n  if(begun) return; begun=true;\n  initAudio();\n  if(actx && actx.state==='suspended') actx.resume();\n  Object.keys(state.channels).forEach(k=>applyChannel(k,1.4));\n  veil.classList.add('gone'); ui.classList.add('ready'); wake();\n  setTimeout(()=>{ if(begun) showToast(intentionLine()); }, 1500);\n}\nveil.addEventListener('click',begin);\nveil.addEventListener('touchend',e=>{ e.preventDefault(); begin(); },{passive:false});\ndocument.addEventListener('visibilitychange',()=>{ if(actx&&!document.hidden&&actx.state==='suspended') actx.resume(); });\n\n/* ---------- toast ---------- */\nconst toastEl=document.getElementById('toast'); let toastTimer=null;\nfunction showToast(msg){\n  toastEl.textContent=msg; toastEl.classList.add('show');\n  clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.classList.remove('show'),3600);\n}\n\n/* ---------- presets ---------- */\nconst presetsEl=document.getElementById('presets');\nfunction applyPreset(p){\n  if(p.theme && p.theme!==state.theme){ state.theme=p.theme; applyTheme(); }\n  if(actx && actx.state==='suspended') actx.resume();\n  CHANNELS.forEach(k=>{\n    const v=p.set[k];\n    if(v!=null){ state.channels[k].on=true; state.channels[k].vol=v; }\n    else state.channels[k].on=false;\n    applyChannel(k,0.8);\n  });\n  syncChannelUI(); save();\n}\nfunction renderPresets(){\n  presetsEl.innerHTML='';\n  BUILTINS.forEach(p=>{\n    const b=document.createElement('button'); b.className='preset';\n    const l=document.createElement('span'); l.textContent=p.name; b.appendChild(l);\n    b.addEventListener('click',()=>applyPreset(p));\n    presetsEl.appendChild(b);\n  });\n  state.presets.forEach((p,i)=>{\n    const b=document.createElement('button'); b.className='preset';\n    const l=document.createElement('span'); l.textContent=p.name; b.appendChild(l);\n    const x=document.createElement('span'); x.className='x'; x.textContent='\\u00d7';\n    x.addEventListener('click',(e)=>{ e.stopPropagation(); state.presets.splice(i,1); save(); renderPresets(); });\n    b.appendChild(x);\n    b.addEventListener('click',(e)=>{ if(e.target===x) return; applyPreset(p); });\n    presetsEl.appendChild(b);\n  });\n  const saveBtn=document.createElement('button'); saveBtn.className='preset save';\n  const sl=document.createElement('span'); sl.textContent='+ Save mix'; saveBtn.appendChild(sl);\n  saveBtn.addEventListener('click',()=>{\n    const set={}; let any=false;\n    CHANNELS.forEach(k=>{ if(state.channels[k].on && state.channels[k].vol>0.02){ set[k]=+state.channels[k].vol.toFixed(2); any=true; } });\n    if(!any){ showToast('Turn on a sound first'); return; }\n    const name=(window.prompt('Name this mix','My Mix')||'').trim();\n    if(!name) return;\n    state.presets.push({ name, theme:state.theme, set }); save(); renderPresets();\n    showToast('Saved \\u201c'+name+'\\u201d');\n  });\n  presetsEl.appendChild(saveBtn);\n}\n\n/* ---------- sleep timer ---------- */\nconst timerToggle=document.getElementById('timerToggle');\nconst timerMenu=document.getElementById('timerMenu');\nconst timerLabel=document.getElementById('timerLabel');\nlet timerEnd=null, timerInt=null;\ntimerToggle.addEventListener('click',(e)=>{ e.stopPropagation(); timerMenu.classList.toggle('open'); });\ndocument.addEventListener('click',(e)=>{ if(!timerToggle.contains(e.target) && !timerMenu.contains(e.target)) timerMenu.classList.remove('open'); });\ntimerMenu.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{ setTimer(+b.dataset.min); timerMenu.classList.remove('open'); }));\nfunction setTimer(min){\n  clearInterval(timerInt);\n  if(actx && actx.state==='suspended') actx.resume();\n  if(!min){ timerEnd=null; timerToggle.classList.remove('active'); updateTimerLabel(); if(actx&&master) master.gain.setTargetAtTime(0.82,actx.currentTime,2); return; }\n  timerEnd=Date.now()+min*60000; timerToggle.classList.add('active');\n  timerInt=setInterval(tickTimer,1000); updateTimerLabel();\n  showToast(min+'-minute timer \\u2014 it will fade out gently');\n}\nfunction tickTimer(){\n  if(timerEnd==null) return;\n  const rem=timerEnd-Date.now();\n  if(rem<=0){ endTimer(); return; }\n  if(rem<=30000 && actx && master){ master.gain.setTargetAtTime(0.0001,actx.currentTime,7); }\n  updateTimerLabel();\n}\nfunction updateTimerLabel(){\n  if(timerEnd==null){ timerLabel.textContent='Timer'; return; }\n  const rem=Math.max(0,timerEnd-Date.now());\n  const m=Math.floor(rem/60000), s=Math.floor((rem%60000)/1000);\n  timerLabel.textContent=m+':'+String(s).padStart(2,'0');\n}\nfunction endTimer(){\n  clearInterval(timerInt); timerEnd=null; timerToggle.classList.remove('active');\n  CHANNELS.forEach(k=>{ state.channels[k].on=false; applyChannel(k,2); });\n  syncChannelUI(); save(); updateTimerLabel();\n  if(actx&&master) master.gain.setTargetAtTime(0.82,actx.currentTime,3);\n  const _h=new Date().getHours();\n  showToast((_h>=21||_h<5)?'Sleep well \\u2014 until morning':'Session complete \\u2014 rest well');\n}\n\n/* ---------- guided breathing (box 4-4-4-4) ---------- */\nconst breatheToggle=document.getElementById('breatheToggle');\nconst breatheGuide=document.getElementById('breatheGuide');\nconst breatheOrb=document.getElementById('breatheOrb');\nconst breathePhase=document.getElementById('breathePhase');\nlet breatheOn=false, breatheStart=0, breatheRAF=null;\nconst PHASES=[['Breathe in',4],['Hold',4],['Breathe out',4],['Hold',4]];\nconst CYCLE=PHASES.reduce((a,p)=>a+p[1],0);\nfunction easeIO(t){ return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }\nbreatheToggle.addEventListener('click',()=>{\n  breatheOn=!breatheOn;\n  breatheToggle.classList.toggle('active',breatheOn);\n  breatheGuide.classList.toggle('on',breatheOn);\n  if(breatheOn){ breatheStart=performance.now(); updateBreathe(); }\n});\nfunction updateBreathe(){\n  const el=((performance.now()-breatheStart)/1000)%CYCLE;\n  let acc=0, label='Breathe in', scale=0.6;\n  for(let i=0;i<PHASES.length;i++){\n    const [name,dur]=PHASES[i];\n    if(el<acc+dur){ label=name; const f=(el-acc)/dur;\n      if(name==='Breathe in') scale=0.6+0.4*easeIO(f);\n      else if(name==='Breathe out') scale=1.0-0.4*easeIO(f);\n      else scale=(i===1)?1.0:0.6;\n      break;\n    }\n    acc+=dur;\n  }\n  breatheOrb.style.transform='scale('+scale.toFixed(3)+')';\n  if(breathePhase.textContent!==label) breathePhase.textContent=label;\n}\n\n/* ---------- collapsible console ---------- */\nconst consoleEl=document.querySelector('.console');\nconst consoleToggle=document.getElementById('consoleToggle');\nfunction applyCollapsed(){\n  consoleEl.classList.toggle('collapsed', !!state.collapsed);\n  consoleToggle.setAttribute('aria-expanded', String(!state.collapsed));\n}\nconsoleToggle.addEventListener('click',()=>{ state.collapsed=!state.collapsed; applyCollapsed(); save(); wake(); });\n\n/* ---------- collapsible sound choices ---------- */\nconst consoleBodyEl=document.getElementById('consoleBody');\nconst soundsToggle=document.getElementById('soundsToggle');\nfunction applySoundsCollapsed(){\n  consoleBodyEl.classList.toggle('sounds-collapsed', !!state.soundsCollapsed);\n  soundsToggle.setAttribute('aria-expanded', String(!state.soundsCollapsed));\n}\nsoundsToggle.addEventListener('click',()=>{ state.soundsCollapsed=!state.soundsCollapsed; applySoundsCollapsed(); save(); wake(); });\n\n/* ---------- emotional design: greeting, welcome-back, intention ---------- */\nfunction intentionLine(){\n  const h=new Date().getHours();\n  const night=(h>=21||h<5);\n  const pool = night\n    ? ['Let the day settle.','Time to soften.','Nothing left to do but rest.','Breathe, and let go.']\n    : ['Take a slow breath.','You are here now.','Let it grow quiet.','Nothing to do but listen.','Settle in.'];\n  return pool[Math.floor(Math.random()*pool.length)];\n}\nfunction emotionalWelcome(){\n  const g=document.getElementById('veilGreeting');\n  const tag=document.getElementById('veilTag');\n  const h=new Date().getHours();\n  let greet;\n  if(h>=5 && h<12) greet='Good morning';\n  else if(h>=12 && h<17) greet='Good afternoon';\n  else if(h>=17 && h<21) greet='Good evening';\n  else greet='Quiet hours';\n  let meta; try{ meta=JSON.parse(localStorage.getItem('stillness.meta')||'{}'); }catch(e){ meta={}; }\n  const returning = !!meta.last;\n  if(g) g.textContent = greet;\n  if(tag && returning){\n    tag.textContent = (h>=21||h<5) ? 'Welcome back. Let the day settle.' : 'Welcome back to the quiet.';\n  }\n  meta.last=Date.now(); meta.visits=(meta.visits||0)+1;\n  try{ localStorage.setItem('stillness.meta', JSON.stringify(meta)); }catch(e){}\n}\n\n/* boot */\nwindow.addEventListener('resize',resize);\nif(!state.themeUserSet){ const _bh=new Date().getHours(); state.theme=(_bh>=20||_bh<6)?'night':'day'; }\nemotionalWelcome();\napplyTheme(); applyAuto(); applyCollapsed(); applySoundsCollapsed(); resize(); syncChannelUI(); renderPresets();\nrequestAnimationFrame(frame);\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
